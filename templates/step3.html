<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contenido del sitio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

body { background-color: #000; font-family: sans-serif; color: white; }

h2 { color: white; }

textarea { resize: none; }

.form-control { background-color: rgba(255,255,255,0.05); color: white; border: none; border-radius: 8px; }

.form-control::placeholder { color: #aaa; }

.card { background-color: rgba(255,255,255,0.05); color: white; border: none; border-radius: 12px; }

.card .row { margin-bottom: 4px; }

.card .form-control, .card textarea { padding: 4px 8px; font-size: 0.85em; }

.btn-gradient { background: linear-gradient(135deg, #8e2de2, #ff6f61); color: white; border: none; padding: 6px 14px; border-radius: 50px; font-weight: bold; box-shadow: 0 0 10px rgba(255,255,255,0.3); transition: transform 0.2s ease, box-shadow 0.2s ease; }

.btn-gradient:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.5); }

label.btn-imagen { display: block; width: 100%; background-color: rgba(255,255,255,0.05); color: white; border: 1px dashed #888; border-radius: 8px; padding: 4px 8px; text-align: center; font-size: 0.75em; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease, border-color 0.3s ease; }

label.btn-imagen:hover { background-color: rgba(255,255,255,0.15); border-color: #ccc; }

label.btn-imagen.cargado { background-color: rgba(40,167,69,0.2); border-color: #28a745; color: #28a745; }

label.btn-imagen.cargado::after { content: " ✓"; color: #28a745; margin-left: 4px; }

#carouselGlobal { position: relative; z-index: 1; }

#carouselGlobal .row { margin: 0; }

#carouselGlobal .col { padding: 4px; }

#carouselGlobal img { max-height: 100px; object-fit: contain; cursor: pointer; }

.carousel-control-prev { left: -40px; width: 40px; height: 100px; top: 50%; transform: translateY(-50%); z-index: 10; }

.carousel-control-next { right: -40px; width: 40px; height: 100px; top: 50%; transform: translateY(-50%); z-index: 10; }

.carousel-control-prev-icon, .carousel-control-next-icon { background-size: 80% 80%; filter: drop-shadow(0 0 2px #000); }

.imagen-carrusel { max-height: 100px; object-fit: contain; cursor: pointer; transition: box-shadow 0.2s ease, border 0.2s ease; }

.imagen-carrusel.usada { opacity: 0.25; filter: grayscale(100%) brightness(0.6); pointer-events: none; }

.col.invisible { visibility: hidden; }

.thumb-wrapper { width: 120px; height: 100px; display: flex; align-items: center; justify-content: center; background-color: rgba(255,255,255,0.05); border-radius: 6px; }

.thumb-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

.thumb-wrapper.seleccionada { border: 2px solid #ff6f61; box-shadow: 0 0 5px #ff6f61; }

.mensaje-final { margin-top: 30px; font-style: italic; text-align: center; color: #ccc; }

.mensaje-final span { display: block; margin-top: 10px; color: #ffcc00; font-weight: bold; }

.loader { border: 8px solid rgba(255,255,255,0.1); border-top: 8px solid #ff6f61; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.precio-chico { width: 10px; }
    
</style>
</head>
<body>
<div class="container py-5">
  <h2 class="mb-4 text-center">Cargá el contenido de tu sitio</h2>

  <!-- Importar productos -->
  <div class="text-center mb-4">
    <input type="file" id="archivoProductos" 
           accept=".csv,.txt,.xls,.xlsx" 
           class="form-control w-50 mx-auto mb-2">
    <button type="button" class="btn-gradient btn-sm" onclick="leerArchivoProductos()">
      📂 Importar lista de productos (CSV, TXT y .xls/.xlsx)
    </button>
  </div>

  <!-- Crear grupo -->
  <div class="mb-4 text-center">
    <input type="text" id="nombreGrupo" class="form-control w-50 mx-auto mb-2" 
           placeholder="Nombre del grupo (ej: Ropa Mujer)">
    <button type="button" class="btn-gradient btn-sm" onclick="crearGrupo()">Crear grupo</button>
  </div>

<!-- Cambia el formulario a: -->
<form id="formulario" method="POST" action="/contenido" enctype="multipart/form-data">
  <div id="grupos"></div>

  <div class="text-center mt-4">
    <!-- 🔥 CAMBIO: Quitar onclick y solo tener type="submit" -->
    <button id="btnContinuar" type="submit" class="btn-gradient px-5 py-2">Continuar</button>
  </div>
</form>
  
  <!-- Mensaje final -->
  <div class="mensaje-final text-center mt-3">
    ¿Tenés mucho contenido? 
    <a href="#" style="color: #00c853; text-decoration: underline;">Contáctanos para ayudarte</a>
    <br>
    <span>⚠️ Si continúas, podrías perder todo el contenido al intentar volver a esta página.</span>
  </div>
</div>

<!-- Spinner -->
<div id="spinner" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
  <div class="loader"></div>
  <p style="margin-top:20px; font-family:sans-serif; font-size:18px; color:#fff;">Procesando imágenes…</p>
</div>

<!-- Modal carrusel -->
<div class="modal fade" id="modalCarrusel" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Elegí una imagen</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div style="padding: 0 40px;">
          <div id="carouselGlobal" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
              <!-- thumbnails se insertan dinámicamente -->
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselGlobal" data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselGlobal" data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button type="button" class="btn btn-gradient" onclick="confirmarImagen()">Usar esta imagen</button>
      </div>
    </div>
  </div>
</div>

<script>
  let grupoId = 0;
  let contadorOrden = 1;
  let imagenSeleccionada = null;   // guarda el nombre del archivo seleccionado
  let filaActual = null;           // referencia a la fila activa
  let imagenesUsadas = [];         // lista global de imágenes ya asignadas

 // 🔑 Ahora las imágenes ya vienen con URL completa desde GCS
const imagenesDisponibles = {{ imagenes_step0 | tojson | safe }};
console.log("🧠 imagenesDisponibles:", imagenesDisponibles);

function eliminarProducto(boton) {
  const fila = boton.closest('.fila-producto');
  const grupo = boton.closest('.card');
  fila.remove();
  actualizarContador(grupo);
}

function confirmarContinuar() {
  return confirm("Se enviarán los datos, ¿deseás continuar?");
}
  
function filaToObj(fila) {
  return {
    nombre: fila.querySelector("input[name='nombre']")?.value || "",
    descripcion: fila.querySelector("textarea[name='descripcion']")?.value || "",
    precio: fila.querySelector("input[name='precio']")?.value || "",
    stock: fila.querySelector("input[name='stock']")?.value || "", // NUEVO
    talles: fila.querySelector("input[name='talles']")?.value || "",
    imagen_url: fila.querySelector("input[name='imagen_elegida']")?.value || "",
    imagen_basename: fila.querySelector("input[name='imagen_basename']")?.value || ""
  };
}
  
function generarFilasDesdeListas(listas) {
  listas.forEach(item => {
    const { grupo, subgrupo, cantidad, talles } = item;
    const nombreGrupo = grupo || "General";

    // Crear grupo si no existe
    let grupoCard = [...document.querySelectorAll(".card:not(.subgrupo)")].find(
      c => c.querySelector("h4")?.textContent.trim() === nombreGrupo
    );
    if (!grupoCard) {
      const inputGrupo = document.getElementById("nombreGrupo");
      if (inputGrupo) {
        inputGrupo.value = nombreGrupo;
        crearGrupo();
        grupoCard = [...document.querySelectorAll(".card:not(.subgrupo)")].find(
          c => c.querySelector("h4")?.textContent.trim() === nombreGrupo
        );
      }
    }

    // Crear subgrupo si corresponde
    let subgrupoCard = grupoCard;
    if (subgrupo) {
      const grupoIdx = grupoCard.id.split("_")[1];
      const inputSub = grupoCard.querySelector(`#inputSubgrupo_${grupoIdx}`);
      const btnCrearSub = grupoCard.querySelector("button[onclick^='crearSubgrupo']");
      if (inputSub && btnCrearSub) {
        inputSub.value = subgrupo;
        crearSubgrupo(btnCrearSub);
        subgrupoCard = [...grupoCard.querySelectorAll(".subgrupo")].find(
          s => s.querySelector(".nombre-subgrupo")?.textContent.trim() === subgrupo
        );
      }
    }

    // Crear filas según cantidad
    const contenedor = subgrupoCard.querySelector(".productos");
    const cant = parseInt(cantidad, 10) || 1;
    for (let i = 0; i < cant; i++) {
      const fila = crearFila(subgrupo || "General", nombreGrupo);
      fila.querySelector("input[name='talles']").value = talles || "";
      contenedor.appendChild(fila);
    }
    actualizarContador(contenedor);
  });
}
  
function crearGrupo() {
  const nombre = document.getElementById('nombreGrupo').value.trim();
  if (!nombre) return alert("Ingresá un nombre para el grupo");

  grupoId++;
  const ordenGrupo = grupoId;

  const grupo = document.createElement('div');
  grupo.className = 'card p-3 mb-4';
  grupo.id = 'grupo_' + grupoId;
  grupo.setAttribute('data-orden', ordenGrupo);

  grupo.innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 nombre-grupo">${nombre}</h4>
      <div>
        <button type="button" class="btn btn-sm btn-outline-light me-2" onclick="editarNombreGrupo(this)">🖉 Editar</button>
        <button type="button" class="btn btn-sm btn-danger" onclick="eliminarGrupo(this)">
          ✕ <span style="font-size: 0.75em;">(Borrar grupo)</span>
        </button>
      </div>
    </div>
    <div class="productos"></div>
    <!-- ✅ Botón para agregar fila directamente al grupo -->
    <div class="text-center mt-2">
      <button type="button" class="btn-gradient btn-sm" onclick="agregarFila(this)">+ Agregar fila</button>
    </div>
    <div class="subgrupos"></div>
    <div class="text-end text-white">Productos cargados: <span class="contador">0</span></div>
    <div class="text-center mt-2">
      <input type="text" class="form-control w-50 d-inline-block" placeholder="Ej: Pantalones" id="inputSubgrupo_${grupoId}">
      <button type="button" class="btn-gradient btn-sm" onclick="crearSubgrupo(this)">+ Crear subgrupo</button>
    </div>
  `;

  document.getElementById('grupos').appendChild(grupo);
  document.getElementById('nombreGrupo').value = '';
}
  
function hydrateFila(filaData, filaEl) {
  console.log("🟢 [Step3] hydrateFila →", filaData);

  // Restaurar imagen elegida
  if (filaData.imagen_elegida) {
    filaEl.querySelector("input[name='imagen_elegida']").value = filaData.imagen_elegida;
    filaEl.querySelector(".preview-imagen").innerHTML =
      `<img src="${filaData.imagen_elegida}" style="width:80px;height:60px;object-fit:contain;border:1px solid #ccc;border-radius:4px;">`;
  }

  // Restaurar basename
  if (filaData.imagen_basename) {
    let hiddenBase = filaEl.querySelector("input[name='imagen_basename']");
    if (!hiddenBase) {
      hiddenBase = document.createElement("input");
      hiddenBase.type = "hidden";
      hiddenBase.name = "imagen_basename";
      filaEl.appendChild(hiddenBase);
    }
    hiddenBase.value = filaData.imagen_basename;
  }
}

function editarNombreGrupo(btn) {
  const card = btn.closest('.card');
  const h4 = card.querySelector('.nombre-grupo');
  const valorActual = h4.textContent.trim();

  const input = document.createElement('input');
  input.type = 'text';
  input.value = valorActual;
  input.className = 'form-control form-control-sm d-inline-block w-50';

  input.onblur = () => guardarNombreGrupo(card, input.value);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
  });

  h4.replaceWith(input);
  input.focus();
}

function guardarNombreGrupo(card, nuevoNombre) {
  const h4 = document.createElement('h4');
  h4.className = 'mb-0 nombre-grupo';
  h4.textContent = nuevoNombre || 'Sin nombre';

  const input = card.querySelector('input[type="text"]');
  if (input) input.replaceWith(h4);

  // ✅ Actualizar hidden inputs de todas las filas dentro del grupo
  card.querySelectorAll('input[name="grupo"]').forEach(h => h.value = nuevoNombre);
}

function actualizarContador(elemento) {
  const card = elemento.classList.contains('productos')
    ? elemento.closest('.card')
    : elemento;

  const contador = card.querySelector('.contador');
  const productos = card.querySelectorAll('.productos > .fila-producto');
  contador.textContent = productos.length;
}

function agregarSlide(items, makeActive) {
  const contenedor = document.querySelector("#carouselGlobal .carousel-inner");
  const div = document.createElement("div");
  div.className = "carousel-item" + (makeActive ? " active" : "");
  const row = document.createElement("div");
  row.className = "row row-cols-4 gx-2 gy-2";

  items.forEach(({ nombre, imagen_url }) => {
    const col = document.createElement("div");
    col.className = "col";
    col.innerHTML = `
      <div class="thumb-wrapper">
        <img src="${imagen_url}" class="imagen-carrusel" alt="${nombre}"
             data-nombre="${nombre}" data-url="${imagen_url}"
             loading="lazy"
             onclick="seleccionarImagen(this)">
      </div>`;
    row.appendChild(col);
  });

  // Rellenar hasta 8 columnas
  const faltantes = 8 - items.length;
  for (let i = 0; i < faltantes; i++) {
    const colInv = document.createElement("div");
    colInv.className = "col invisible";
    colInv.innerHTML = `<div class="thumb-wrapper"></div>`;
    row.appendChild(colInv);
  }

  div.appendChild(row);
  contenedor.appendChild(div);
}
  
function abrirCarrusel(btn) {
  filaActual = btn.closest('.fila-producto');
  const modal = new bootstrap.Modal(document.getElementById('modalCarrusel'));

  console.log("🟢 [Step3] abrirCarrusel → filaActual:", filaActual);

  // Si el carrusel está vacío, inicializarlo
  if (!document.querySelector("#carouselGlobal .carousel-item")) {
    console.warn("⚠️ [Step3] Carrusel vacío, inicializando...");
    inicializarCarrusel();
  }

  // Limpiar selección previa
  document.querySelectorAll('#carouselGlobal .thumb-wrapper')
    .forEach(w => w.classList.remove('seleccionada'));

  // ✅ Recuperar imágenes usadas globalmente
  let usadasGlobal = JSON.parse(localStorage.getItem("imagenesUsadas") || "[]");
  if (!Array.isArray(usadasGlobal)) usadasGlobal = [];

  // Deshabilitar imágenes ya usadas en todo el catálogo
  document.querySelectorAll('#carouselGlobal .carousel-item img').forEach(img => {
    const nombre = img.dataset.nombre;
    if (usadasGlobal.includes(nombre)) {
      img.classList.add("usada");
      img.style.opacity = "0.25";
      img.style.filter = "grayscale(100%) brightness(0.6)";
      img.style.pointerEvents = "none";
      console.log("🚫 [Step3] Imagen marcada como usada:", nombre);
    } else {
      img.classList.remove("usada");
      img.style.opacity = "1";
      img.style.filter = "none";
      img.style.pointerEvents = "auto";
    }
  });

  // Si la fila ya tenía imagen elegida, remarcarla
  const hiddenBase = filaActual.querySelector("input[name='imagen_basename']");
  if (hiddenBase && hiddenBase.value) {
    const nombreActual = hiddenBase.value;
    console.log("📌 [Step3] Fila ya tenía imagen:", nombreActual);
    const imgActual = document.querySelector(`#carouselGlobal img[data-nombre="${nombreActual}"]`);
    if (imgActual) {
      seleccionarImagen(imgActual);
      console.log("🎯 [Step3] Imagen marcada como seleccionada:", nombreActual);
    } else {
      console.warn("⚠️ [Step3] No se encontró imgActual para:", nombreActual);
    }
  } else {
    // Seleccionar la primera disponible si no había nada
    const firstImg = document.querySelector("#carouselGlobal .carousel-item.active img:not(.usada)");
    if (firstImg) {
      console.log("✅ [Step3] Seleccionando primera disponible:", firstImg.dataset.nombre);
      seleccionarImagen(firstImg);
    } else {
      console.warn("⚠️ [Step3] No hay imagen disponible para seleccionar");
    }
  }

  console.log("📂 [Step3] Abriendo carrusel para fila:", filaActual);
  modal.show();
}

function inicializarCarrusel() {
  const contenedor = document.querySelector("#carouselGlobal .carousel-inner");
  contenedor.innerHTML = ""; // limpiar carrusel

  cargarImagenesDesdeIndexedDB((count) => {
    if (count > 0) {
      console.log("📦 [Step3] Carrusel restaurado desde IndexedDB con", count, "imágenes");
    } else {
      // Fallback: usar rutas finales guardadas en localStorage (ya son URLs completas de GCS)
      const imagenesFinales = JSON.parse(localStorage.getItem("imagenes_step0") || "[]");
      if (Array.isArray(imagenesFinales) && imagenesFinales.length) {
        let first = true, buffer = [];

        imagenesFinales.forEach(ruta => {
          if (!ruta) return;

          // 🔑 basename siempre será el UUID.webp al final de la URL
          const basename = ruta.split("/").pop();
          const imagen_url = ruta;

          buffer.push({ nombre: basename, imagen_url });
          console.log("➕ [Step3] Imagen agregada al buffer:", { nombre: basename, imagen_url });

          if (buffer.length === 8) {
            agregarSlide(buffer, first);
            console.log("🖼️ [Step3] Slide agregado con 8 imágenes");
            first = false;
            buffer = [];
          }
        });

        if (buffer.length) {
          agregarSlide(buffer, first);
          console.log("🖼️ [Step3] Slide final agregado con", buffer.length, "imágenes");
        }
        console.log("📦 [Step3] Carrusel inicializado con imágenes finales:", imagenesFinales.length);
      } else {
        console.warn("⚠️ [Step3] No hay imágenes en localStorage.imagenes_step0");
      }
    }

    // Selección inicial
    const firstImg = document.querySelector('#carouselGlobal .carousel-item.active img:not(.usada)');
    if (firstImg) {
      seleccionarImagen(firstImg);
      console.log("✅ [Step3] Selección inicial:", window.imagenSeleccionada, window.imagenSeleccionadaUrl);
    }
  });
}

function procesarFila(grupo, subgrupo, productoBase, descripcion, precio, talles, cantidadRaw, stock) {
  const cantidad = parseInt(cantidadRaw || "1", 10);
  
  let productos = productoBase ? [productoBase] : [grupo || "Producto"];
  
  // 🔥 CORRECCIÓN: NO numerar productos, repetir el mismo nombre
  if (cantidad > 1) {
    const base = productos[0];
    productos = [];
    for (let i = 0; i < cantidad; i++) {
      productos.push(base); // MISMO NOMBRE PARA TODAS
    }
  }
  
  productos.forEach(prod => {
    agregarFilaImportada(prod, descripcion, precio, grupo, subgrupo, talles, stock);
  });
  
  return productos.length;
}
  
function leerArchivoProductos() {
  const input = document.getElementById("archivoProductos");
  if (!input.files.length) {
    alert("⚠️ Seleccioná un archivo primero");
    return;
  }

  const file = input.files[0];
  const ext = file.name.toLowerCase().split('.').pop();
  let totalFilasAgregadas = 0;

  // 👉 CSV / TXT
  if (ext === "csv" || ext === "txt") {
    const reader = new FileReader();
    reader.onload = function(e) {
      const contenido = e.target.result;
      const lineas = contenido.split(/\r?\n/).filter(l => l.trim());
      const sep = lineas.some(l => l.includes(";")) ? ";" : ",";
      totalFilasAgregadas = 0;

      lineas.forEach((linea, idx) => {
        const partes = linea.split(sep).map(p => p.trim());
        const nombre = partes[0] || "";
        const descripcion = partes[1] || "";
        const precio = partes[2] || "";
        const grupo = partes[3] || "";
        const subgrupo = partes[4] || "";
        const talles = partes[5] || "";
        const stock = partes[6] || "";
        const filas = parseInt(partes[7]) || 1;

        if (!grupo) {
          console.warn("⚠️ Línea descartada por falta de grupo:", partes);
          return;
        }

        const filasCreadas = procesarFila(grupo, subgrupo, nombre, descripcion, precio, talles, filas, stock);
        totalFilasAgregadas += filasCreadas;
      });

      alert(totalFilasAgregadas > 0
        ? `✅ Productos importados: ${totalFilasAgregadas}`
        : "❌ No se importaron filas desde CSV/TXT");
    };
    reader.readAsText(file);
  }

  // 👉 Excel XLS / XLSX
  else if (ext === "xls" || ext === "xlsx") {
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      totalFilasAgregadas = 0;

      rows.forEach((obj, idx) => {
        const grupo = obj.Grupo || obj.Categoria || "";
        const subgrupo = obj.Subgrupo || obj.Subcategoria || "";
        const nombre = obj.Nombre || obj.Producto || "";
        const descripcion = obj.Descripcion || "";
        const precio = obj.Precio || "";
        const talles = obj.Talles || "";
        const stock = obj.Stock || "";
        const filas = parseInt(obj.Filas) || 1;

        if (!grupo) {
          console.warn("⚠️ Fila descartada por falta de grupo:", obj);
          return;
        }

        const filasCreadas = procesarFila(grupo, subgrupo, nombre, descripcion, precio, talles, filas, stock);
        totalFilasAgregadas += filasCreadas;
      });

      alert(totalFilasAgregadas > 0
        ? `✅ Productos importados desde Excel: ${totalFilasAgregadas}`
        : "❌ No se importaron filas desde Excel");
    };
    reader.readAsArrayBuffer(file);
  }

  else {
    alert("⚠️ Formato no soportado. Subí CSV, TXT o Excel (.xls/.xlsx)");
  }

function agregarFilaImportada(nombre, descripcion, precio, grupo, subgrupo, talles, stock) {
  // Buscar o crear grupo
  let grupoCard = [...document.querySelectorAll(".card:not(.subgrupo)")].find(
    c => c.querySelector("h4")?.textContent.trim() === grupo
  );
  if (!grupoCard) {
    const inputGrupo = document.getElementById("nombreGrupo");
    if (inputGrupo) {
      inputGrupo.value = grupo;
      crearGrupo();
      grupoCard = [...document.querySelectorAll(".card:not(.subgrupo)")].find(
        c => c.querySelector("h4")?.textContent.trim() === grupo
      );
    }
  }

  // Buscar o crear subgrupo
  let subgrupoCard = null;
  if (subgrupo) {
    subgrupoCard = grupoCard && [...grupoCard.querySelectorAll(".subgrupo")].find(
      s => s.querySelector("strong")?.textContent.trim() === subgrupo
    );
    if (!subgrupoCard && grupoCard) {
      const grupoIdx = grupoCard.id.split("_")[1];
      const inputSub = grupoCard.querySelector(`#inputSubgrupo_${grupoIdx}`);
      const btnCrearSub = grupoCard.querySelector("button[onclick^='crearSubgrupo']");
      if (inputSub && btnCrearSub) {
        inputSub.value = subgrupo;
        crearSubgrupo(btnCrearSub);
        subgrupoCard = [...grupoCard.querySelectorAll(".subgrupo")].find(
          s => s.querySelector("strong")?.textContent.trim() === subgrupo
        );
      }
    }
  }

  // Si no hay subgrupo, usar grupo
  if (!subgrupoCard) {
    subgrupoCard = grupoCard;
  }

  if (!subgrupoCard) {
    console.warn("⚠️ No se pudo crear/ubicar grupo/subgrupo:", grupo, subgrupo);
    return;
  }

  // Crear fila
  const fila = crearFila(subgrupo || grupo, grupo);
  
  // Rellenar datos - TALLES COMPLETOS COMO TEXTO "S,M,L"
  fila.querySelector("input[name='nombre']").value = nombre;
  fila.querySelector("textarea[name='descripcion']").value = descripcion;
  fila.querySelector("input[name='precio']").value = precio;
  fila.querySelector("input[name='stock']").value = stock;
  fila.querySelector("input[name='talles']").value = talles || ""; // "S,M,L" queda entero

  // Insertar
  const contenedor = subgrupoCard.querySelector(".productos");
  if (contenedor) {
    contenedor.appendChild(fila);
  } else {
    subgrupoCard.appendChild(fila);
  }

  actualizarContador(subgrupoCard);
}

  function ensureDB(callback) {
      const request = indexedDB.open("imagenesDB", 3);
      request.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("imagenes")) {
          db.createObjectStore("imagenes");
          console.log("📦 Store 'imagenes' creado (upgrade)");
        }
      };
      request.onsuccess = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("imagenes")) {
          console.warn("⚠️ DB sin store. Borrando y recreando…");
          db.close();
          const del = indexedDB.deleteDatabase("imagenesDB");
          del.onsuccess = () => {
            const re = indexedDB.open("imagenesDB", 2);
            re.onupgradeneeded = ev => ev.target.result.createObjectStore("imagenes");
            re.onsuccess = ev => callback(ev.target.result);
          };
          del.onerror = () => { console.error("❌ No se pudo borrar la DB"); callback(db); };
        } else {
          callback(db);
        }
      };
      request.onerror = e => console.error("❌ Error abriendo IndexedDB:", e.target.error);
    }

function validarYEnviar() {
  const grupos = document.querySelectorAll('.card');
  
  // Validar que haya al menos un grupo
  if (grupos.length === 0) {
    alert('❌ Agregá al menos un grupo antes de continuar');
    return false;
  }

  let productosValidos = 0;
  let errores = [];
  let imagenesInvalidas = false;

  // Recorrer todos los grupos y subgrupos
  grupos.forEach(grupo => {
    const filas = grupo.querySelectorAll('.fila-producto');
    
    filas.forEach((fila, index) => {
      const nombre = fila.querySelector('input[name="nombre"]');
      const precio = fila.querySelector('input[name="precio"]');
      const stock = fila.querySelector('input[name="stock"]');
      const inputImagen = fila.querySelector('input[name="imagen_elegida"]');

      const nombreValido = nombre && nombre.value.trim();
      const precioValido = precio && precio.value.trim();
      const stockValido = stock && stock.value.trim() !== "";
      const imagenValida = inputImagen && inputImagen.value.trim() !== "";

      // Validar campos obligatorios
      if (nombreValido && precioValido && imagenValida) {
        productosValidos++;
        
        // Validar que el precio sea un número válido
        const precioNum = parseFloat(precio.value.replace(',', '.'));
        if (isNaN(precioNum) || precioNum <= 0) {
          errores.push(`❌ El precio del producto "${nombre.value}" debe ser un número mayor a 0`);
        }
        
        // Validar stock si está presente
        if (stockValido) {
          const stockNum = parseInt(stock.value);
          if (isNaN(stockNum) || stockNum < 0) {
            errores.push(`❌ El stock del producto "${nombre.value}" debe ser un número válido (0 o mayor)`);
          }
        }
      } else {
        // Identificar qué falta
        if (!nombreValido && precioValido) {
          errores.push(`❌ Falta el nombre del producto en la fila ${index + 1}`);
        }
        if (nombreValido && !precioValido) {
          errores.push(`❌ Falta el precio del producto "${nombre.value}"`);
        }
        if (nombreValido && precioValido && !imagenValida) {
          errores.push(`❌ Falta seleccionar una imagen para el producto "${nombre.value}"`);
        }
      }
      
      // Marcar si hay imagen faltante para productos con nombre/precio
      if ((nombreValido || precioValido) && !imagenValida) {
        imagenesInvalidas = true;
      }
    });
  });

  // Verificar si hay al menos un producto completo
  if (productosValidos === 0) {
    alert('❌ Completá al menos una fila con:\n• Nombre\n• Precio\n• Imagen seleccionada');
    return false;
  }

  // Mostrar errores específicos si los hay
  if (errores.length > 0) {
    alert('❌ Hay errores en los datos:\n\n' + errores.join('\n'));
    return false;
  }

  if (imagenesInvalidas) {
    const continuar = confirm('⚠️ Hay productos sin imagen seleccionada.\n\n¿Deseás continuar de todos modos?\n(Los productos sin imagen no se guardarán)');
    if (!continuar) {
      return false;
    }
  }

  // Mostrar resumen y confirmar
  const confirmacion = confirm(`✅ Validación exitosa!\n\n• Productos completos: ${productosValidos}\n• Total grupos: ${grupos.length}\n\n¿Continuar con el envío?`);
  
  if (!confirmacion) {
    return false;
  }

  // Mostrar spinner
  document.getElementById('spinner').style.display = 'flex';
  
  return true;
}
// Agrega esto al final del script, después de window.addEventListener("load", ...)
document.addEventListener('DOMContentLoaded', function() {
  // Agregar event listener al formulario
  document.getElementById('formulario').addEventListener('submit', function(e) {
    // Validar antes de enviar
    if (!validarYEnviar()) {
      e.preventDefault(); // Evitar envío si la validación falla
      document.getElementById('spinner').style.display = 'none'; // Ocultar spinner si se mostró
    }
  });
  
  // También agregar validación en tiempo real (opcional, para mejor UX)
  document.addEventListener('input', function(e) {
    if (e.target.matches('input[name="nombre"], input[name="precio"], input[name="stock"]')) {
      validarCampoEnTiempoReal(e.target);
    }
  });
});

// Función para validación en tiempo real
function validarCampoEnTiempoReal(campo) {
  const fila = campo.closest('.fila-producto');
  const nombre = fila.querySelector('input[name="nombre"]');
  const precio = fila.querySelector('input[name="precio"]');
  
  if (campo === nombre || campo === precio) {
    const valor = campo.value.trim();
    
    if (campo === precio && valor) {
      // Validar que el precio sea numérico
      const precioNum = parseFloat(valor.replace(',', '.'));
      if (isNaN(precioNum) || precioNum <= 0) {
        campo.style.border = '2px solid #dc3545';
        campo.style.backgroundColor = 'rgba(220, 53, 69, 0.1)';
      } else {
        campo.style.border = '2px solid #28a745';
        campo.style.backgroundColor = '';
      }
    } else if (campo === nombre && valor) {
      campo.style.border = '2px solid #28a745';
      campo.style.backgroundColor = '';
    }
  }
}
